version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hospitalai-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hospitalai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - hospitalai-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hospitalai-backend-prod
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/hospitalai
      JWT_SECRET: super_secret_hospital_ai_security_key_2026
    ports:
      - "8000:8000"
    networks:
      - hospitalai-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hospitalai-frontend-prod
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - hospitalai-network

volumes:
  pgdata:
    name: hospitalai_pgdata_prod

networks:
  hospitalai-network:
    driver: bridge
